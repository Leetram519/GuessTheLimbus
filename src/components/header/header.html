<header class="game-header">
<div class="header-left">
    <div class="mode-menu">
        <a routerLink="/idguess" class="mode-tag">ID Guesser</a>
        <div class="mode-dropdown" role="menu" aria-label="ID Guesser Modes">
            <a routerLink="/idguess" class="mode-option" role="menuitem">Daily</a>
            <a routerLink="/endless" class="mode-option" role="menuitem">Endless</a>
        </div>
    </div>
</div>

<div class="header-brand">
    <img src="logo.png" alt="GuessTheLimbus logo" class="brand-logo" />
    <div class="brand-text">
    <h1>Guess The Limbus</h1>
    <p class="subtitle">A Daily Challenge</p>
    </div>
</div>

<div class="header-buttons">
    <button class="header-btn bug-btn" (click)="openBugReport()">
    <span class="btn-icon">🐛</span>
    <span class="btn-text">Report Bug</span>
    </button>
    <button class="header-btn news-btn" (click)="openNewsModal()">
    <span class="btn-icon">📰</span>
    <span class="btn-text">News</span>
    </button>
</div>
</header>
